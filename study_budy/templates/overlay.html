<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Study Budy Overlay</title>
  <style>
    html, body {
      margin: 0;
      background: transparent;
      color: white;
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #overlay {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: min(560px, 100vw);
      height: 100vh;
      overflow: hidden;
    }
    .card {
      padding: var(--padding);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }
    .overlay-title {
      color: #bd75ff;
      text-align: center;
      font-size: var(--name-size);
      font-weight: 800;
      margin: 0 0 12px;
    }
    .person-title {
      margin: 0 0 12px;
      font-size: calc(var(--name-size) * .78);
    }
    .task {
      margin-top: 8px;
      font-size: var(--task-size);
      line-height: 1.35;
    }
    .done {
      color: var(--done);
      text-decoration: line-through;
      opacity: .8;
    }
    .list-viewport {
      position: relative;
      overflow: hidden;
      min-height: 0;
      flex: 1;
    }
    .list-content {
      display: grid;
      gap: 14px;
      will-change: transform;
    }
    .streamer-label {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 7px;
      border: 1px solid #ffd84f;
      border-radius: 999px;
      color: #ffd84f;
      font-size: calc(var(--task-size) * .68);
      vertical-align: middle;
    }
  </style>
</head>
<body>
<main id="overlay" aria-live="polite"></main>
<script>
let index = 0;
let lastCycleAt = 0;
let lastCycleMode = '';
let lastCycleCount = 0;
let listScrollAnimation = null;
let listScrollSignature = '';
let lastDrawSignature = '';
const root = document.getElementById('overlay');
const safeText = value => document.createTextNode(String(value || ''));
const cycleDelay = settings => Math.max(8, Number(settings.cycle_seconds || 8)) * 1000;
const titleIcon = name => ({book: '▰', box: '▣', star: '☆', heart: '♡'}[name] || '▰');

function titleCard(settings) {
  const article = document.createElement('article');
  article.className = 'card';
  const title = document.createElement('div');
  title.className = 'overlay-title';
  title.append(safeText(`${titleIcon(settings.title_icon)} ${settings.task_list_title}`));
  article.append(title);
  return article;
}

function card(participant, isStreamer = false) {
  const article = document.createElement('article');
  article.className = 'card';
  const heading = document.createElement('h2');
  heading.className = 'person-title';
  heading.append(safeText(participant.display_name));
  if (isStreamer) {
    const badge = document.createElement('span');
    badge.className = 'streamer-label';
    badge.append(safeText('Streamer'));
    heading.append(badge);
  }
  article.append(heading);
  participant.tasks.forEach((task, taskIndex) => {
    const item = document.createElement('div');
    item.className = `task${task.is_complete ? ' done' : ''}`;
    item.append(safeText(`${taskIndex + 1}. ${task.text}`));
    article.append(item);
  });
  return article;
}

function cycledParticipant(participants, settings, mode) {
  const now = Date.now();
  if (lastCycleMode !== mode || lastCycleCount !== participants.length) {
    index = 0;
    lastCycleAt = now;
    lastCycleMode = mode;
    lastCycleCount = participants.length;
  } else if (now - lastCycleAt >= cycleDelay(settings)) {
    index += 1;
    lastCycleAt = now;
  }
  return participants[index % participants.length];
}

function stopListScroll() {
  if (listScrollAnimation) cancelAnimationFrame(listScrollAnimation);
  listScrollAnimation = null;
  listScrollSignature = '';
}

function listContentSignature(data) {
  return JSON.stringify({
    layout_mode: data.appearance.layout_mode,
    participants: data.participants.map(participant => ({
      id: participant.id,
      display_name: participant.display_name,
      participant_type: participant.participant_type,
      tasks: participant.tasks.map(task => [task.id, task.text, task.is_complete]),
    })),
    connected_streamer: data.connected_streamer,
    appearance: {
      task_list_title: data.appearance.task_list_title,
      title_icon: data.appearance.title_icon,
      show_completed: data.appearance.show_completed,
      font_family: data.appearance.font_family,
      participant_font_size: data.appearance.participant_font_size,
      task_font_size: data.appearance.task_font_size,
      text_color: data.appearance.text_color,
      card_color: data.appearance.card_color,
      card_opacity: data.appearance.card_opacity,
      border_radius: data.appearance.border_radius,
    },
  });
}

function startAutomaticListScrolling(viewport, content, signature) {
  // ---- AUTOMATIC LIST SCROLLING ----
  // This section scrolls through my users and task items when they do not all fit.
  // peepeepoo poo, the task parade now scrolls instead of falling off the frame
  const maxScroll = Math.max(0, content.scrollHeight - viewport.clientHeight);
  if (maxScroll <= 2) {
    stopListScroll();
    content.style.transform = 'translateY(0)';
    return;
  }
  if (listScrollSignature === signature && listScrollAnimation) return;
  stopListScroll();
  listScrollSignature = signature;
  const topPauseMs = 2500;
  const bottomPauseMs = 2500;
  const pixelsPerSecond = 24;
  const scrollDurationMs = (maxScroll / pixelsPerSecond) * 1000;
  const totalDurationMs = topPauseMs + scrollDurationMs + bottomPauseMs + scrollDurationMs;

  const step = timestamp => {
    const elapsed = timestamp % totalDurationMs;
    let y = 0;
    if (elapsed < topPauseMs) {
      y = 0;
    } else if (elapsed < topPauseMs + scrollDurationMs) {
      y = ((elapsed - topPauseMs) / scrollDurationMs) * maxScroll;
    } else if (elapsed < topPauseMs + scrollDurationMs + bottomPauseMs) {
      y = maxScroll;
    } else {
      y = maxScroll - ((elapsed - topPauseMs - scrollDurationMs - bottomPauseMs) / scrollDurationMs) * maxScroll;
    }
    content.style.transform = `translateY(${-Math.round(y)}px)`;
    listScrollAnimation = requestAnimationFrame(step);
  };
  listScrollAnimation = requestAnimationFrame(step);
}

function drawListLayout(data, signature) {
  // ---- LIST LAYOUT MODE ----
  // This layout puts the connected streamer's to-do list at the top.
  root.append(titleCard(data.appearance));
  const viewport = document.createElement('section');
  viewport.className = 'list-viewport';
  const content = document.createElement('div');
  content.className = 'list-content';
  data.participants.forEach((participant, participantIndex) => {
    content.append(card(participant, participantIndex === 0 && participant.participant_type === 'streamer'));
  });
  viewport.append(content);
  root.append(viewport);
  requestAnimationFrame(() => startAutomaticListScrolling(viewport, content, signature));
}

function draw(data) {
  const settings = data.appearance;
  const signature = listContentSignature(data);
  if (settings.layout_mode === 'list' && signature === lastDrawSignature && listScrollAnimation) return;
  root.style.cssText = `--padding:${settings.padding}px;--border:${settings.border_color};--radius:${settings.border_radius}px;--card:${settings.card_color}${Math.round(settings.card_opacity * 2.55).toString(16).padStart(2, '0')};--name-size:${settings.participant_font_size}px;--task-size:${settings.task_font_size}px;--done:${settings.completed_text_color};font-family:${settings.font_family},sans-serif;color:${settings.text_color};`;
  root.replaceChildren();
  if (settings.layout_mode === 'list') {
    lastDrawSignature = signature;
  } else {
    lastDrawSignature = '';
    stopListScroll();
    root.append(titleCard(settings));
  }
  const participants = data.participants;
  if (!participants.length) {
    stopListScroll();
    const message = document.createElement('div');
    message.className = 'card';
    message.append(safeText('Waiting for tasks…'));
    root.append(message);
    return;
  }
  if (settings.layout_mode === 'list') {
    drawListLayout(data, signature);
  } else {
    root.append(card(cycledParticipant(participants, settings, 'cycle')));
  }
}

async function refresh() {
  try {
    draw(await (await fetch('/api/overlay', {cache: 'no-store'})).json());
  } catch {
    root.textContent = 'Study Budy overlay is reconnecting…';
  }
}
refresh();
setInterval(refresh, 1000);
window.addEventListener('resize', () => {
  lastDrawSignature = '';
  refresh();
});
</script>
</body>
</html>
