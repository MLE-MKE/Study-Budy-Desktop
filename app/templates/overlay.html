<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PeePeePooPoo test</title>

<style>

body {
    background: rgba(0,0,0,0);
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
    width: 300px;
}

h2 {
    margin-top: 0;
}

.task {
    margin: 6px 0;
}
.task.done {
    text-decoration: line-through;
    color: gray;    
}

</style>

</head>

<body>

<div class="container">
<h2>PeePeePooPoo Connection Test </h2>
<div id="tasks"></div>
</div>

<script>

// const username = "{{ username }}";
const username = "{{ username }}";
const SERVER = `/tasks/${username}`;

async function loadTasks() {
    try {
        const response = await fetch(SERVER);
        const data = await response.json();

        const taskContainer = document.getElementById("tasks");
        taskContainer.innerHTML = "";

        if (!data.tasks || data.tasks.length === 0) {
            taskContainer.innerHTML = "<div class='task'>No tasks yet.</div>";
            return;
        }

       data.tasks.forEach((task, index) => {
    const div = document.createElement("div");
    div.className = "task";

    let taskText = "";
    let isDone = false;

    if (typeof task === "string") {
        taskText = task;
    } else {
        taskText = task.text || "";
        isDone = !!task.done;
    }

    if (isDone) {
        div.classList.add("done");
    }

    div.innerText = (index + 1) + ". " + taskText;
    taskContainer.appendChild(div);
});

    } catch (error) {
        console.log("Error loading tasks:", error);
    }
}

loadTasks();
setInterval(loadTasks, 3000);
</script>

</body>
</html>
